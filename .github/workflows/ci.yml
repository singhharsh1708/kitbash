name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli-os:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
        working-directory: packages/cli
      - run: npm run check
        working-directory: packages/cli
      - run: npm test
        working-directory: packages/cli
      - run: node dist/index.js --version
        working-directory: packages/cli
      - name: Benchmark is deterministic and its committed output is fresh
        # Linux-only: CRLF working trees would skew the measured token counts.
        if: runner.os == 'Linux'
        run: npm run bench --prefix packages/cli && git diff --exit-code docs/benchmarks/README.md

  # Aggregator keeping the required status-check name "cli" stable across the OS matrix.
  cli:
    needs: cli-os
    runs-on: ubuntu-latest
    steps:
      - run: echo "cli passed on all platforms"

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate JSON schema is well-formed
        run: node -e "JSON.parse(require('fs').readFileSync('spec/schema/skill.schema.json','utf8')); console.log('schema ok')"
