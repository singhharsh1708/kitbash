name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: packages/cli
      - run: npm run check
        working-directory: packages/cli
      - run: npm test
        working-directory: packages/cli
      - run: node dist/index.js --version
        working-directory: packages/cli
      - name: Benchmark is deterministic and its committed output is fresh
        run: npm run bench --prefix packages/cli && git diff --exit-code docs/benchmarks/README.md

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate JSON schema is well-formed
        run: node -e "JSON.parse(require('fs').readFileSync('spec/schema/skill.schema.json','utf8')); console.log('schema ok')"
