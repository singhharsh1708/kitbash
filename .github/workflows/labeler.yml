name: labeler

# Auto-label PRs by which files they touch (see .github/labeler.yml).
# pull_request_target so it also labels bot PRs (Dependabot, benchmark-refresh);
# labeler only reads the changed-file list via the API — it never checks out or
# runs PR code, so this is safe.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          sync-labels: true
