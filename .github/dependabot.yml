version: 2
updates:
  # CLI package dependencies (typescript, @types/node)
  - package-ecosystem: npm
    directory: /packages/cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    labels:
      - dependencies

  # GitHub Actions versions (actions/checkout, setup-node, …)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
