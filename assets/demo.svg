<rect width="780" height="406" rx="12" fill="#0d1119" stroke="#2c3444"/>
<circle cx="22" cy="17" r="5.5" fill="#2c3444"/><circle cx="40" cy="17" r="5.5" fill="#2c3444"/><circle cx="58" cy="17" r="5.5" fill="#2c3444"/>
<text x="390" y="21" text-anchor="middle" font-size="11" fill="#8b96ab">kitbash — real session</text>
<line x1="0" y1="34" x2="780" y2="34" stroke="#2c3444"/>
<text class="l0" x="18" y="68" font-size="13"><tspan fill="#8b96ab">$ </tspan><tspan fill="#dbe2ee" font-weight="600">kitbash init</tspan></text>
<text class="l1" x="18" y="90" font-size="13"><tspan fill="#dbe2ee">created kitbash.toml and .kitbash/skills/</tspan></text>
<text class="l3" x="18" y="134" font-size="13"><tspan fill="#8b96ab">$ </tspan><tspan fill="#dbe2ee" font-weight="600">kitbash install gh:addyosmani/agent-skills/skills/code-review-and-quality</tspan></text>
<text class="l4" x="18" y="156" font-size="13"><tspan fill="#7fd18c">✓ </tspan><tspan fill="#dbe2ee">installed code-review-and-quality@0.0.0 — Conducts multi-axis code review…</tspan></text>
<text class="l5" x="18" y="178" font-size="13"><tspan fill="#8b96ab">  budget 6000 tokens · standing 250 · mode skill</tspan></text>
<text class="l6" x="18" y="200" font-size="13"><tspan fill="#ffb454">  ⚠ unmanifested (SKILL.md only) — defaults applied</tspan></text>
<text class="l7" x="18" y="222" font-size="13"><tspan fill="#8b96ab">  pinned in kitbash.lock</tspan></text>
<text class="l9" x="18" y="266" font-size="13"><tspan fill="#8b96ab">$ </tspan><tspan fill="#dbe2ee" font-weight="600">kitbash compile</tspan></text>
<text class="l10" x="18" y="288" font-size="13"><tspan fill="#ffb454">→ </tspan><tspan fill="#dbe2ee">.claude/skills/code-review-and-quality/SKILL.md</tspan></text>
<text class="l11" x="18" y="310" font-size="13"><tspan fill="#ffb454">→ </tspan><tspan fill="#dbe2ee">.cursor/rules/code-review-and-quality.mdc</tspan></text>
<text class="l12" x="18" y="332" font-size="13"><tspan fill="#ffb454">→ </tspan><tspan fill="#dbe2ee">AGENTS.md §code-review-and-quality</tspan></text>
<text class="l13" x="18" y="354" font-size="13"><tspan fill="#ffb454">⚠ agentsmd cannot lazy-load — this skill costs ~5044 tokens standing</tspan></text>
<text class="l14" x="18" y="376" font-size="13"><tspan fill="#8b96ab">compiled 1 skill(s) for 3 agent target(s)</tspan></text>
<rect class="cur" x="18" y="373" width="8" height="15" fill="#ffb454"/>
</svg>
