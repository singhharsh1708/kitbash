<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 406" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" role="img" aria-label="kitbash demo: init, install a real third-party skill, compile to three agents">
