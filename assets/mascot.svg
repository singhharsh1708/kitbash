    <path d="M 158 282 C 146 190 168 130 196 104 L 206 64 L 224 94 L 244 86 L 258 46 L 274 86 L 292 92 L 310 60 L 322 100 C 350 128 366 190 354 282 C 344 238 336 218 328 208 L 184 208 C 176 218 168 238 158 282 Z" fill="url(#hair)"/>

