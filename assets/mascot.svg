<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Kitbasher, the tinkerer who builds from parts">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#28324a"/>
      <stop offset="100%" stop-color="#141924"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3e4a61"/>
      <stop offset="100%" stop-color="#2c3444"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffc76b"/>
      <stop offset="100%" stop-color="#b06a1a"/>
    </radialGradient>
    <clipPath id="badge">
      <circle cx="256" cy="256" r="236"/>
    </clipPath>
  </defs>

  <!-- badge -->
  <circle cx="256" cy="256" r="236" fill="url(#bg)"/>

  <g clip-path="url(#badge)">
    <!-- floating kit parts -->
    <g transform="translate(84,314) rotate(-14)" stroke="#8b96ab" fill="none">
      <rect x="0" y="0" width="84" height="104" rx="10" stroke-width="7"/>
      <path d="M 42 0 V 104 M 0 52 H 84" stroke-width="5"/>
      <circle cx="21" cy="26" r="13" stroke="#ffb454" stroke-width="6" stroke-dasharray="4 5"/>
      <circle cx="21" cy="26" r="4" fill="#ffb454" stroke="none"/>
      <path d="M 63 18 l 8 5 v 9 l -8 5 l -8 -5 v -9 z" fill="#8b96ab" stroke="none"/>
      <rect x="12" y="70" width="18" height="16" rx="5" fill="#35516e" stroke-width="4"/>
      <circle cx="63" cy="78" r="9" stroke-width="5"/>
    </g>
    <circle cx="428" cy="180" r="20" fill="none" stroke="#8b96ab" stroke-width="8" stroke-dasharray="6 6"/>
    <circle cx="428" cy="180" r="6" fill="#ffb454"/>
    <rect x="422" y="316" width="26" height="26" rx="6" transform="rotate(20 435 329)" fill="#35516e" stroke="#8b96ab" stroke-width="4"/>
    <path d="M 150 111 l 2.5 6.5 l 6.5 2.5 l -6.5 2.5 l -2.5 6.5 l -2.5 -6.5 l -6.5 -2.5 l 6.5 -2.5 z" fill="#ffd98c"/>
    <path d="M 392 101 l 2.5 6.5 l 6.5 2.5 l -6.5 2.5 l -2.5 6.5 l -2.5 -6.5 l -6.5 -2.5 l 6.5 -2.5 z" fill="#ffd98c"/>
    <path d="M 118 391 l 2.5 6.5 l 6.5 2.5 l -6.5 2.5 l -2.5 6.5 l -2.5 -6.5 l -6.5 -2.5 l 6.5 -2.5 z" fill="#ffd98c"/>

    <!-- neck -->
    <path d="M 234 320 L 234 388 Q 256 398 278 388 L 278 320 Z" fill="#ffd8b4"/>
    <path d="M 234 320 L 234 352 Q 256 362 278 352 L 278 320 Z" fill="#edb88c"/>

    <!-- jacket -->
    <path d="M 118 512 C 126 436 178 396 256 392 C 334 396 386 436 394 512 Z" fill="#35516e"/>
    <path d="M 256 414 L 232 392 L 214 410 L 244 428 Z" fill="#2a415a"/>
    <path d="M 256 414 L 280 392 L 298 410 L 268 428 Z" fill="#2a415a"/>
    <path d="M 256 424 L 256 512" stroke="#ffb454" stroke-width="3.5"/>
    <rect x="152" y="446" width="34" height="24" rx="6" transform="rotate(-12 169 458)" fill="#ffb454" opacity="0.9"/>

