    <ellipse cx="172" cy="256" rx="11" ry="17" fill="#ffd8b4"/>
    <ellipse cx="340" cy="256" rx="11" ry="17" fill="#ffd8b4"/>

    <!-- face -->
    <path d="M 174 238 C 174 190 208 148 256 148 C 304 148 338 190 338 238 C 338 288 310 336 256 352 C 202 336 174 288 174 238 Z" fill="#ffd8b4"/>
    <path d="M 174 238 C 174 288 202 336 256 352 C 228 338 194 300 188 240 C 186 210 190 186 198 170 C 182 186 174 210 174 238 Z" fill="#c98850" opacity="0.18"/>

