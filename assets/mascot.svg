    <ellipse cx="215" cy="264" rx="21" ry="15" fill="#ffffff"/>
    <ellipse cx="297" cy="264" rx="21" ry="15" fill="#ffffff"/>
    <circle cx="215" cy="266" r="12" fill="url(#iris)"/>
    <circle cx="297" cy="266" r="12" fill="url(#iris)"/>
    <circle cx="215" cy="266" r="5.5" fill="#1d1509"/>
    <circle cx="297" cy="266" r="5.5" fill="#1d1509"/>
    <circle cx="211" cy="261" r="3.5" fill="#ffffff"/>
    <circle cx="293" cy="261" r="3.5" fill="#ffffff"/>
    <circle cx="220" cy="271" r="1.8" fill="#ffffff" opacity="0.8"/>
    <circle cx="302" cy="271" r="1.8" fill="#ffffff" opacity="0.8"/>
    <path d="M 188 256 L 193 262 Q 215 246 237 258" fill="none" stroke="#232a38" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M 275 258 Q 297 246 319 262 L 324 256" fill="none" stroke="#232a38" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M 228 282 q 6 3 12 1" fill="none" stroke="#232a38" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <path d="M 272 283 q 6 2 12 0" fill="none" stroke="#232a38" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

    <!-- brows -->
    <path d="M 192 234 Q 214 224 234 231" fill="none" stroke="#232a38" stroke-width="6" stroke-linecap="round"/>
    <path d="M 278 228 Q 300 216 320 225" fill="none" stroke="#232a38" stroke-width="6" stroke-linecap="round"/>

    <!-- nose + mouth -->
    <path d="M 256 294 q 4 6 0 11" fill="none" stroke="#d99a6c" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 232 316 Q 258 336 286 312" fill="none" stroke="#232a38" stroke-width="5" stroke-linecap="round"/>
    <path d="M 286 312 q 6 -2 8 -8" fill="none" stroke="#232a38" stroke-width="4" stroke-linecap="round"/>

    <!-- hair, bangs -->
    <path d="M 178 252 C 176 194 200 160 256 158 C 312 160 336 194 334 252 L 314 218 L 296 254 L 278 216 L 258 252 L 240 214 L 222 250 L 204 218 Z" fill="url(#hair)"/>

    <!-- goggles -->
    <path d="M 174 186 C 200 156 312 156 338 186 L 338 164 C 312 134 200 134 174 164 Z" fill="#232a38"/>
    <circle cx="216" cy="158" r="25" fill="#ffcf7d" stroke="#4c576e" stroke-width="7"/>
    <circle cx="296" cy="158" r="25" fill="#ffcf7d" stroke="#4c576e" stroke-width="7"/>
    <ellipse cx="208" cy="150" rx="7" ry="4" transform="rotate(-20 208 150)" fill="#ffffff" opacity="0.85"/>
    <ellipse cx="288" cy="150" rx="7" ry="4" transform="rotate(-20 288 150)" fill="#ffffff" opacity="0.85"/>
    <rect x="168" y="162" width="10" height="16" rx="3" fill="#4c576e"/>
    <rect x="334" y="162" width="10" height="16" rx="3" fill="#4c576e"/>
